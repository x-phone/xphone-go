name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changelog:
    # Release PRs are exempt: their job is to move content out of
    # `## Unreleased` into a new `## vX.Y.Z` section, not add new entries.
    if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check CHANGELOG.md updated
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md updated"
          else
            echo "::error::CHANGELOG.md was not updated. Please add an entry describing your changes."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Race detector
        run: go test -race ./... -count=1

      - name: Format check
        run: |
          gofmt -s -l . | tee /tmp/gofmt.out
          test ! -s /tmp/gofmt.out

  test-opus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install libopus
        run: sudo apt-get install -y libopus-dev libopusfile-dev

      - name: Build with Opus
        run: go build -tags opus ./...

      - name: Test with Opus
        run: go test -tags opus ./... -count=1

      - name: Race detector with Opus
        run: go test -tags opus -race ./... -count=1
